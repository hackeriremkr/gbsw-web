<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>홀수/짝수</title>
</head>
<body>
    <input id="input_number" type="number" />
    <button id="btn" type="button">확인</button>
    <div id="print"></div>
</body>
</html>
<script>
    document.getElementById("btn").onclick = function () {let num = Number(document.getElementById("input_number").value);if(!Number.isInteger(num)){alert("정수가 아닙니다. 다시 입력해주세요.")}else if(num % 2 === 0){result = "짝수"}else{result = "홀수"};document.getElementById("print").textContent = result;};  
</script>
