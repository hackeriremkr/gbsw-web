<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>witch</title>
</head>
<body>
    <input id="input" type="number" />
    <button id="btn" type="button">확인</button>
    <div id="print"></div>
</body>
</html>
<script>
    document.getElementById("btn").onclick = function() {
        let result = null;
        let num = Number(document.getElementById("input").value);
        switch (true) {
            case num > 100 || num < 0:
                result = "올바른 점수(0~100)를 입력하세요.";
                break;
            case num >= 90:
                result = "A";
                break;
            case num >= 80:
                result = "B";
                break;
            case num >= 70:
                result = "C";
                break;
            case num >= 60:
                result = "D";
                break;
            default:
                result = "F";
                break;
        }
        document.getElementById("print").textContent = result;
    };
</script>
